<template>
    <lightning-card title="Filters" icon-name="standard:calibration">
        <div class="slds-var-m-horizontal_medium">
            <lightning-input
                label="Search Key"
                type="search"
                onchange={handleSearchKeyChange}
            ></lightning-input>
            <section>
                <lightning-slider
                    label="Max Price"
                    step="100"
                    min="0"
                    max="10000"
                    value={maxPrice}
                    onchange={handleMaxPriceChange}
                ></lightning-slider>
            </section>
            <section>
                <lightning-combobox
                    label="Product Family"
                    placeholder="Select Product Family"
                    value=""
                    options={productFamilyOptions}
                    onchange={handleProductFamilyChange}
                ></lightning-combobox>
                <template if:true={productFamilyError}>
                    <c-error-panel
                        type="inlineMessage"
                        friendly-message="Error loading product families"
                        errors={productFamilyError}
                    ></c-error-panel>
                </template>
            </section>
            <section>
                <h1>Level</h1>
                <template if:true={levels.data}>
                    <template for:each={levels.data.values} for:item="level">
                        <lightning-input
                            key={level.value}
                            label={level.label}
                            data-filter="levels"
                            data-value={level.value}
                            type="checkbox"
                            checked
                            onchange={handleCheckboxChange}
                        ></lightning-input>
                    </template>
                </template>
                <template if:true={levels.error}>
                    <c-error-panel
                        type="inlineMessage"
                        friendly-message="Error loading levels"
                        errors={levels.error}
                    ></c-error-panel>
                </template>
            </section>
        </div>
    </lightning-card>
</template>
